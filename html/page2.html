<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="../css/style2.css">
</head>
<body>
    <div class="container">
        <form class="frmLogin">
            <h3 class="title">Đăng Nhập Hệ Thống</h3>
            <div class="form-group">
                <div class="UserName">
                    <label for="textUserName" class="txtUserName">Tên Đăng Nhập:</label>
                    <input type="text" id="textUserName" name="txtUserName" >
                </div>
                <div class="Password">
                    <label for="textPassword" class="txtPassword">Mật Khẩu: </label>
                    <input type="password" id="textPassword" name="txtPassword">
                </div>
                <div class="control">
                    <input type="submit"  class="Button" value="Đăng Nhập" id="sbLogin">
                    <input type="reset" class="Button" value="Nhập Lại" id="sbCancel">
                </div>
            </div>
        </form>
    </div>
</body>
</html>
