<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>page5</title>
    <link rel="stylesheet" href="../css/style5.css">
</head>
<body>
    <form id="formInBCC">
        <h2>In Bảng Cửu Chương</h2>
        <label for="bcc">Nhập Số từ 2-9:</label>
        <input type="number"  name="num" id="bcc" min="2" max="9">
        <input type="button" onclick="inBCC()" value="IN"></input>
        <div id="kq"></div>
    </form>
    <script>
        function inBCC(){
            const myForm = document.forms["formInBCC"];
            const myNumber=myForm.elements[0];
            let num=parseInt(myNumber.value);
            let kq="<div style='text-align:center'>";
            for (let i=1;i<=10;i++){
                kq+= num + "x" +  i + " = " + (num*i) + "<br>";
            }
            kq+="</div>"
            document.getElementById("kq").innerHTML=kq;
        }

    </script>
</body>
</html>
